name: 构建APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 生成签名密钥
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias myapp \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass android \
            -keypass android \
            -dname "CN=CourseCram, OU=Dev, O=CourseCram, L=Hefei, ST=Anhui, C=CN"

      - name: 添加 Android 平台 (兼容版本)
        run: cordova platform add android@13

      - name: 构建 APK
        run: cordova build android --release

      - name: 查找 APK
        run: |
          echo "=== 所有APK文件 ==="
          find . -name "*.apk" 2>/dev/null
          echo ""
          echo "=== 所有AAB文件 ==="
          find . -name "*.aab" 2>/dev/null

      - name: 签名 APK
        run: |
          APK=$(find platforms/android -name "*.apk" | grep -i release | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found, checking all build outputs..."
            find platforms/android -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null
            exit 1
          fi
          echo "Found: $APK ($(du -h "$APK" | cut -f1))"
          # Try to sign (may already be signed)
          cp "$APK" app-release.apk 2>/dev/null || true
          # Verify it's valid
          if [ -f app-release.apk ]; then
            echo "✓ APK ready: $(du -h app-release.apk | cut -f1)"
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 专升本备考-工程力学测量
          path: app-release.apk

      - name: 备份签名文件
        uses: actions/upload-artifact@v4
        with:
          name: 签名文件-妥善保管
          path: release.keystore
