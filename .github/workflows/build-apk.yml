name: 构建APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 生成签名密钥
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias myapp \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass android \
            -keypass android \
            -dname "CN=CourseCram, OU=Dev, O=CourseCram, L=Hefei, ST=Anhui, C=CN"

      - name: 添加 Android 平台
        run: cordova platform add android@13

      - name: 构建发布包
        run: cordova build android --release

      - name: 处理输出文件
        run: |
          echo "=== 查找构建产物 ==="
          find platforms/android -name "*.apk" 2>/dev/null
          find platforms/android -name "*.aab" 2>/dev/null

          APK=$(find platforms/android -name "*.apk" | grep -i release | head -1)
          AAB=$(find platforms/android -name "*.aab" | grep -i release | head -1)

          if [ -n "$APK" ]; then
            echo "Found APK: $APK"
            cp "$APK" app-release.apk
          elif [ -n "$AAB" ]; then
            echo "Found AAB: $AAB (converting to universal APK...)"
            # Download bundletool if not available
            BUNDLETOOL=""
            for p in "$ANDROID_SDK_ROOT/cmdline-tools/latest/lib/bundletool.jar" \
                     "$ANDROID_HOME/cmdline-tools/latest/lib/bundletool.jar" \
                     "bundletool.jar"; do
              if [ -f "$p" ]; then BUNDLETOOL="$p"; break; fi
            done
            if [ -z "$BUNDLETOOL" ]; then
              echo "Downloading bundletool..."
              curl -sL -o bundletool.jar \
                "https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar"
              BUNDLETOOL="bundletool.jar"
            fi
            java -jar "$BUNDLETOOL" build-apks \
              --bundle="$AAB" \
              --output=app.apks \
              --mode=universal \
              --ks=release.keystore \
              --ks-pass=pass:android \
              --ks-key-alias=myapp \
              --key-pass=pass:android
            unzip -o app.apks universal.apk -d ./apkout/ && cp ./apkout/universal.apk app-release.apk
          fi

          if [ -f app-release.apk ]; then
            echo "✓ APK ready: $(du -h app-release.apk | cut -f1)"
          else
            echo "ERROR: No APK/AAB found!"
            find platforms/android -type f \( -name "*.apk" -o -name "*.aab" \)
            exit 1
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 专升本备考-工程力学测量
          path: app-release.apk

      - name: 备份签名文件
        uses: actions/upload-artifact@v4
        with:
          name: 签名文件-妥善保管
          path: release.keystore
