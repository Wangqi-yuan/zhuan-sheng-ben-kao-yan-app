name: 构建APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-30 build-tools;30.0.3 platform-tools'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 生成签名密钥
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias myapp \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass android \
            -keypass android \
            -dname "CN=CourseCram, OU=Dev, O=CourseCram, L=Hefei, ST=Anhui, C=CN"
          echo "KEYSTORE_PASS=android" >> $GITHUB_ENV
          echo "KEY_ALIAS=myapp" >> $GITHUB_ENV
          echo "KEY_PASS=android" >> $GITHUB_ENV

      - name: 添加 Android 平台
        run: cordova platform add android@latest

      - name: 构建发布 APK
        run: |
          cordova build android --release -- \
            --keystore=release.keystore \
            --storePassword=android \
            --alias=myapp \
            --password=android

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 专升本备考-工程力学测量
          path: platforms/android/app/build/outputs/apk/release/app-release.apk

      - name: 备份签名文件
        uses: actions/upload-artifact@v4
        with:
          name: 签名文件-妥善保管
          path: release.keystore
