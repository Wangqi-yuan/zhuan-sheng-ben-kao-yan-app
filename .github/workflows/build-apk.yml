name: 构建APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 生成签名密钥
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias myapp \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass android \
            -keypass android \
            -dname "CN=CourseCram, OU=Dev, O=CourseCram, L=Hefei, ST=Anhui, C=CN"

      - name: 添加 Android 平台
        run: cordova platform add android@latest

      - name: 构建未签名 APK
        run: |
          cd platforms/android
          ./gradlew assembleRelease
          cd ../..

      - name: 查找并对齐 APK
        run: |
          UNSIGNED_APK=$(find platforms/android -name "*.apk" | grep -i release | head -1)
          echo "Found unsigned APK: $UNSIGNED_APK"
          # zipalign
          $ANDROID_HOME/build-tools/36.0.0/zipalign -v -p 4 "$UNSIGNED_APK" app-release-aligned.apk
          # sign
          $ANDROID_HOME/build-tools/36.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:android \
            --ks-key-alias myapp \
            --key-pass pass:android \
            --out app-release.apk \
            app-release-aligned.apk
          # verify
          $ANDROID_HOME/build-tools/36.0.0/apksigner verify app-release.apk
          echo "APK size: $(du -h app-release.apk | cut -f1)"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 专升本备考-工程力学测量
          path: app-release.apk

      - name: 备份签名文件
        uses: actions/upload-artifact@v4
        with:
          name: 签名文件-妥善保管
          path: release.keystore
